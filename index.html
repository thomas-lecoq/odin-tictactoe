<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <script type="module" src="js/main.js"></script>
    <title>Document</title>
</head>
<body>
    <div id="content">
        <div id="name-ctnr">
            <h1 id="name"><span class="cross-symbol">X</span><span class="circle-symbol">O</span>- TIC TAC TOE -<span class="circle-symbol">O</span><span class="cross-symbol">X</span></h1>
        </div>
        <div id="instructions-ctnr">
            <p id="instructions">Set players name & symbol !</p>
        </div>
        <div id="game-ctnr">
            <form id="players-form">
                <div id="players-declaration-ctnr">
                    <div id="player-one-ctnr" class="player-ctnr">
                        <label class="player-name-label" for="player-one">Player 1 name :</label>
                        <input id="player-one" class="player-name-input" type="text" name="player-one" required maxlength="30" value="Player 1">
                        <label class="player-symbol-label" for="symbol-one">Symbol :</label>
                        <select id="symbol-one" class="player-symbol-select" name="symbol-one" required>
                            <option value="X" selected>X</option>
                            <option value="O">O</option>
                            <option value="△">△</option>
                            <option value="★">★</option>
                            <option value="♥">♥</option>
                        </select>
                    </div>
                    <div id="player-two-ctnr" class="player-ctnr">
                        <label class="player-name-label" for="player-two">Player 2 name :</label>
                        <input id="player-two" class="player-name-input" type="text" name="player-two" required maxlength="30" value="Player 2">
                        <label class="player-symbol-label" for="symbol-two">Symbol :</label>
                        <select id="symbol-two" class="player-symbol-select" name="symbol-two" required>
                            <option value="X">X</option>
                            <option value="O" selected>O</option>
                            <option value="△">△</option>
                            <option value="★">★</option>
                            <option value="♥">♥</option>
                        </select>
                    </div>
                </div>
                <button class=commands-ctnr id="submit-btn" type="submit">Start game</button>
            </form>
        </div>
        <!-- <div id="commands-ctnr">
            <p id="commands">commands goes here</p>
        </div> -->
    </div>
</body>
</html>
